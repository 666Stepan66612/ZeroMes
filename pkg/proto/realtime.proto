syntax = "proto3";

package realtime;

option go_package = "gen/realtimepb";

service ConnectionService {
    rpc ConnectionStream(stream ConnectionRequest) returns (stream ConnectionResponse);
}

message ConnectionRequest {
    oneof payload {
        RegisterClient register = 1; // Register new client
        Disconnect disconnect = 2; // Explicit disconnect
    }
}

message ConnectionResponse {
    oneof payload {
        ConnectionStatus status = 1;
        IncomingMessage message = 2;
        Error error = 3;
    }
}

message IncomingMessage {
    string message_id = 1;
    string sender_id = 2;
    string chat_id = 3;
    string content = 4;
    int64 timestamp = 5;
}

message RegisterClient {
    string user_id = 1;
}

message Disconnect {}

message ConnectionStatus {
    string user_id = 1;
    bool connected = 2;
}







service ActionsService {
    rpc SendTyping(TypingRequest) returns (TypingResponse);
    rpc SendReadReceipt(ReadReceiptRequest) returns (ReadReceiptResponse);
}

message TypingRequest {
    string user_id = 1;
    string chat_id = 2;
    bool is_typing = 3;
}

message TypingResponse {
    bool success = 1;
    Error error = 2;
}

message ReadReceiptRequest {
    string user_id = 1;
    string message_id = 2;
}

message ReadReceiptResponse {
    bool success = 1;
    Error error = 2;
}

message Error {
    string code = 1;
    string message = 2;
}

// generate
// protoc --go_out=. --go-grpc_out=. proto/realtime.proto
