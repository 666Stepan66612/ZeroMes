global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8083']

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:8080']

  - job_name: 'message-service'
    static_configs:
      - targets: ['message-service:9091']

  - job_name: 'realtime-service'
    static_configs:
      - targets: ['realtime-service:9092']