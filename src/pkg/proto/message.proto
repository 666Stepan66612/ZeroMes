syntax = "proto3";

package message;

option go_package = "github.com/666Stepan66612/ZeroMes/pkg/gen/messagepb";

import "google/protobuf/timestamp.proto";

service MessageService {
    rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
    rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse);
    rpc MarkAsRead(MarkAsReadRequest) returns (MarkAsReadResponse);
    rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse);
    rpc AlterMessage(AlterMessageRequest) returns (AlterMessageResponse);
    rpc GetChats(GetChatsRequest) returns (GetChatsResponse);
    rpc SaveChatKeys(SaveChatKeysRequest) returns (SaveChatKeysResponse);
    rpc UpdateChatKeys(UpdateChatKeysRequest) returns (UpdateChatKeysResponse);

    // Group chat methods
    rpc CreateGroup(CreateGroupRequest) returns (CreateGroupResponse);
    rpc AddGroupMember(AddGroupMemberRequest) returns (AddGroupMemberResponse);
    rpc RemoveGroupMember(RemoveGroupMemberRequest) returns (RemoveGroupMemberResponse);
    rpc LeaveGroup(LeaveGroupRequest) returns (LeaveGroupResponse);
    rpc GetGroupChats(GetGroupChatsRequest) returns (GetGroupChatsResponse);
    rpc GetGroupMembers(GetGroupMembersRequest) returns (GetGroupMembersResponse);
    rpc SaveGroupKeySeed(SaveGroupKeySeedRequest) returns (SaveGroupKeySeedResponse);
    rpc GetGroupKeySeed(GetGroupKeySeedRequest) returns (GetGroupKeySeedResponse);
}

message SendMessageRequest {
    string chat_id = 1;
    string sender_id = 2;
    string recipient_id = 3; // empty if group message
    string encrypted_content = 4;
    string message_type = 5;
    string group_id = 6; // empty if 1-1 chat
    int32 key_version = 7; // for group messages
}

message GetMessagesRequest {
    string chat_id = 1;
    string user_id = 2;
    int32 limit = 3;
    string last_message_id = 4;
}

message MarkAsReadRequest {
    string chat_id = 1;
    string user_id = 2;
    string last_message_id = 3;
}

message DeleteMessageRequest {
    string message_id = 1;
    string user_id = 2;
}

message AlterMessageRequest {
    string message_id = 1;
    string user_id = 2;
    string new_content = 3;
}

message SendMessageResponse {
    Message message = 1;
}

message GetMessagesResponse {
    repeated Message messages = 1;
    string next_message_id = 2;
    bool has_more = 3;
}

message MarkAsReadResponse {
    bool success = 1;
}

message DeleteMessageResponse {
    bool success = 1;
}

message AlterMessageResponse {
    bool success = 1;
}

message Message {
    string id = 1;
    string chat_id = 2;
    string sender_id = 3;
    string recipient_id = 4; // empty if group message
    string encrypted_content = 5;
    string message_type = 6;
    google.protobuf.Timestamp created_at = 7;
    MessageStatus status = 8;
    string group_id = 9; // empty if 1-1 chat
    int32 key_version = 10; // for group messages
}

enum MessageStatus {
    SENT = 0; // to Kafka
    DELIVERED = 1; // recipient is online
    READ = 2; // readed
}

message GetChatsRequest {
    string user_id = 1;
}

message GetChatsResponse {
    repeated Chat chats = 1;
}

message Chat {
    string id = 1;
    string user_id = 2;
    string companion_id = 3;
    google.protobuf.Timestamp created_at = 4;
    google.protobuf.Timestamp last_message_at = 5;
    string encrypted_key = 6;
    string key_iv = 7;
    string companion_login = 8;
    string last_message = 9;
}

message SaveChatKeysRequest {
    string user_id = 1;
    string companion_id = 2;
    string encrypted_key = 3;
    string key_iv = 4;
}

message SaveChatKeysResponse {
    bool success = 1;
}

message UpdateChatKeysRequest {
    string user_id = 1;
    repeated ChatKeyUpdate keys = 2;
}

message ChatKeyUpdate {
    string companion_id = 1;
    string encrypted_key = 2;
    string key_iv = 3;
}

message UpdateChatKeysResponse {
    bool success = 1;
    int32 updated_count = 2;
    string error = 3;
}

message GroupChat {
    string id = 1;
    string name = 2;
    string avatar_url = 3;
    string created_by = 4;
    int32 key_version = 5;
    google.protobuf.Timestamp created_at = 6;
    string last_message = 7;
    google.protobuf.Timestamp last_message_at = 8;
}

message GroupMember {
    string user_id = 1;
    string login = 2;
    string role = 3; // 'admin' or 'member'
    google.protobuf.Timestamp joined_at = 4;
    string can_read_from_message_id = 5;
}

message GroupKeySeed {
    string encrypted_seed = 1;
    string encrypted_by = 2; // user_id who encrypted
    int32 key_version = 3;
}

// Create group
message CreateGroupRequest {
    string name = 1;
    repeated string member_ids = 2; // initial members
    string created_by = 3;
    string group_key_seed = 4; // generated by creator
    repeated GroupKeySeedDistribution seed_distributions = 5;
}

message GroupKeySeedDistribution {
    string user_id = 1;
    string encrypted_seed = 2; // encrypted via ECDH
    string encrypted_by = 3;
}

message CreateGroupResponse {
    GroupChat group = 1;
}

// Add member
message AddGroupMemberRequest {
    string group_id = 1;
    string user_id = 2; // who is being added
    string added_by = 3;
    string encrypted_seed = 4; // encrypted for new member via ECDH
}

message AddGroupMemberResponse {
    bool success = 1;
}

// Remove member
message RemoveGroupMemberRequest {
    string group_id = 1;
    string user_id = 2; // who is being removed
    string removed_by = 3;
}

message RemoveGroupMemberResponse {
    bool success = 1;
    int32 new_key_version = 2;
}

// Leave group
message LeaveGroupRequest {
    string group_id = 1;
    string user_id = 2;
}

message LeaveGroupResponse {
    bool success = 1;
}

// Get user's groups
message GetGroupChatsRequest {
    string user_id = 1;
}

message GetGroupChatsResponse {
    repeated GroupChat groups = 1;
}

// Get group members
message GetGroupMembersRequest {
    string group_id = 1;
}

message GetGroupMembersResponse {
    repeated GroupMember members = 1;
}

// Save group key seed
message SaveGroupKeySeedRequest {
    string user_id = 1;
    string group_id = 2;
    string encrypted_seed = 3;
    string encrypted_by = 4;
    int32 key_version = 5;
}

message SaveGroupKeySeedResponse {
    bool success = 1;
}

// Get group key seed
message GetGroupKeySeedRequest {
    string user_id = 1;
    string group_id = 2;
}

message GetGroupKeySeedResponse {
    GroupKeySeed seed = 1;
    int32 current_key_version = 2;
}

// generate
// protoc --go_out=. --go-grpc_out=. proto/message.proto
