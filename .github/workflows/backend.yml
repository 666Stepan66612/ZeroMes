name: Backend Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/auth-service/**'
      - 'src/message-service/**'
      - 'src/realtime-service/**'
      - 'src/api-gateway/**'
      - 'src/pkg/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/auth-service/**'
      - 'src/message-service/**'
      - 'src/realtime-service/**'
      - 'src/api-gateway/**'
      - 'src/pkg/**'

jobs:
  test-auth-service:
    name: Auth Service Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache-dependency-path: src/auth-service/go.sum

    - name: Install dependencies
      working-directory: ./src/auth-service
      run: go mod download

    - name: Run tests
      working-directory: ./src/auth-service
      run: |
        go test -v -race ./...

    - name: Build
      working-directory: ./src/auth-service
      run: go build -v ./...

  test-message-service:
    name: Message Service Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache-dependency-path: src/message-service/go.sum

    - name: Install dependencies
      working-directory: ./src/message-service
      run: go mod download

    - name: Run tests
      working-directory: ./src/message-service
      run: |
        go test -v -race ./...

    - name: Build
      working-directory: ./src/message-service
      run: go build -v ./...

  test-realtime-service:
    name: Realtime Service Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache-dependency-path: src/realtime-service/go.sum

    - name: Install dependencies
      working-directory: ./src/realtime-service
      run: go mod download

    - name: Build
      working-directory: ./src/realtime-service
      run: go build -v ./...

  test-api-gateway:
    name: API Gateway Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache-dependency-path: src/api-gateway/go.sum

    - name: Install dependencies
      working-directory: ./src/api-gateway
      run: go mod download

    - name: Build
      working-directory: ./src/api-gateway
      run: go build -v ./...

  test-pkg:
    name: Shared Package Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Run JWT tests
      working-directory: ./src/pkg/jwt
      run: go test -v -race ./...
