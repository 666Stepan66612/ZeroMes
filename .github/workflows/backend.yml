name: Backend Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'auth-service/**'
      - 'message-service/**'
      - 'realtime-service/**'
      - 'api-gateway/**'
      - 'pkg/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'auth-service/**'
      - 'message-service/**'
      - 'realtime-service/**'
      - 'api-gateway/**'
      - 'pkg/**'

jobs:
  test-auth-service:
    name: Auth Service Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache-dependency-path: auth-service/go.sum

    - name: Install dependencies
      working-directory: ./auth-service
      run: go mod download

    - name: Run tests
      working-directory: ./auth-service
      run: |
        go test -v -race ./...

    - name: Check formatting
      working-directory: ./auth-service
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "Go code is not formatted:"
          gofmt -d .
          exit 1
        fi

    - name: Build
      working-directory: ./auth-service
      run: go build -v ./...

  test-message-service:
