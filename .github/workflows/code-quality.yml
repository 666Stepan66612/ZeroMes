name: Code Quality

on:
  pull_request:
    branches: [main]

jobs:
  golangci-lint:
    name: Go Linter
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, message-service, realtime-service, api-gateway]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v4
      with:
        version: latest
        working-directory: ./${{ matrix.service }}
        args: --timeout=5m

  check-dependencies:
    name: Check Go Dependencies
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Verify dependencies
      run: |
        for service in auth-service message-service realtime-service api-gateway; do
          echo "Checking $service..."
          cd $service
          go mod verify
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "$service has untracked dependency changes" && exit 1)
          cd ..
        done

  check-frontend-dependencies:
    name: Check Frontend Dependencies
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Check for vulnerabilities
      working-directory: ./frontend
      run: |
        npm audit --audit-level=high

    - name: Check outdated packages
      working-directory: ./frontend
      run: npm outdated || true
