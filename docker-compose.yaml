services:
  postgres-auth:
    image: postgres:16-alpine
    container_name: auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_AUTH_USER}
      POSTGRES_PASSWORD: ${POSTGRES_AUTH_PASSWORD}
      POSTGRES_DB: ${POSTGRES_AUTH_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - auth-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_AUTH_USER} -d ${POSTGRES_AUTH_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m

  postgres-messages:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: messages-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_MSG_USER}
      POSTGRES_PASSWORD: ${POSTGRES_MSG_PASSWORD}
      POSTGRES_DB: ${POSTGRES_MSG_DB}
    volumes:
      - postgres_messages_data:/var/lib/postgresql/data
    networks:
      - messenger-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_MSG_USER} -d ${POSTGRES_MSG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    image: redis:7-alpine
    container_name: auth-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    networks:
      - auth-network
      - realtime-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300m

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_EXTERNAL_PORT}:9093"
    environment:
      # KRaft mode (without Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      
      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      
      # Settings
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      
      # Logs
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: ${KAFKA_CLUSTER_ID} # ID KRaft
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - messenger-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1g

  migrate-auth:
    image: migrate/migrate
    restart: on-failure
    volumes:
      - ./auth-service/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://${POSTGRES_AUTH_USER}:${POSTGRES_AUTH_PASSWORD}@postgres-auth:5432/${POSTGRES_AUTH_DB}?sslmode=disable"
      - "up"
    depends_on:
      postgres-auth:
        condition: service_healthy
    networks:
      - auth-network
  
  migrate-messages:
    image: migrate/migrate
    restart: on-failure
    volumes:
      - ./message-service/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://${POSTGRES_MSG_USER}:${POSTGRES_MSG_PASSWORD}@postgres-messages:5432/${POSTGRES_MSG_DB}?sslmode=disable"
      - "up"
    depends_on:
      postgres-messages:
        condition: service_healthy
    networks:
      - messenger-network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_AUTH_USER}:${POSTGRES_AUTH_PASSWORD}@postgres-auth:5432/${POSTGRES_AUTH_DB}?sslmode=disable
      REDIS_URL: auth-redis:${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PORT: ${AUTH_SERVICE_PORT}
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate-auth:
        condition: service_completed_successfully
    networks:
      - auth-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
  
  message-service:
    build:
      context: .
      dockerfile: message-service/Dockerfile
    container_name: message-service
    environment:
      POSTGRES_URL: postgres://${POSTGRES_MSG_USER}:${POSTGRES_MSG_PASSWORD}@postgres-messages:5432/${POSTGRES_MSG_DB}?sslmode=disable
      GRPC_PORT: ${MESSAGE_SERVICE_GRPC_PORT}
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: messages.sent
    depends_on:
      postgres-messages:
        condition: service_healthy
      kafka:
        condition: service_healthy
      migrate-messages:
        condition: service_completed_successfully
    networks:
      - messenger-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/50051'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m

  realtime-service:
    build:
      context: .
      dockerfile: realtime-service/Dockerfile
    container_name: realtime-service
    environment:
      PORT: ${REALTIME_SERVICE_PORT}
      REDIS_URL: auth-redis:${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: messages.sent
      JWT_SECRET: ${JWT_ACCESS_SECRET}
      KAFKA_GROUP_ID: ${REALTIME_KAFKA_GROUP_ID}
      INSTANCE_ID: ${REALTIME_INSTANCE_ID}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - realtime-network
      - messenger-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8082'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    environment:
      AUTH_SERVICE_URL: http://auth-service:${AUTH_SERVICE_PORT}
      MESSAGE_SERVICE_ADDR: message-service:${MESSAGE_SERVICE_GRPC_PORT}
      REALTIME_SERVICE_ADDR: realtime-service:${REALTIME_SERVICE_PORT}
      REDIS_ADDR: auth-redis:${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      PORT: ${API_GATEWAY_PORT}
    ports:
      - "${API_GATEWAY_PORT}:${API_GATEWAY_PORT}"
    depends_on:
      auth-service:
        condition: service_started
      message-service:
        condition: service_started
      realtime-service:
        condition: service_started
    networks:
      - auth-network
      - messenger-network
      - realtime-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8083 || exit 1"]
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128m

networks:
  auth-network:
    driver: bridge
  messenger-network:
    driver: bridge
  realtime-network:
    driver: bridge

volumes:
  postgres_data:
  postgres_messages_data:
  kafka_data: 
